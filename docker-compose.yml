# ENN - External Neural Network
# SQLite backend. No external databases.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enn-backend
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=openai
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=MiniMax-M2.7-highspeed
      - LLM_BASE_URL=https://api.minimax.io/v1/chat/completions
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
      - ./logs:/app/logs
      - ./test_data:/app/test_data
